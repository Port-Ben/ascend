<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ascend">
<meta name="theme-color" content="#05070c">
<title>Ascend</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%2305070c'/%3E%3Cpath d='M90 34 L128 128 L90 108 L52 128 Z' fill='%234da3ff'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#05070c;--panel:#0b111c;--panel-2:#111a29;--line:#1c2739;
    --ink:#eaf1fb;--ink-dim:#8fa3bd;--ink-faint:#556781;
    --cy:#4da3ff;--cy-soft:rgba(77,163,255,.35);--gold:#f0b429;--red:#e05252;
    --g1:#3ddc97;--g2:#4da3ff;--g3:#a97bff;--g4:#ff8a4d;--g5:#ff5d73;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{color:var(--ink);font-family:ui-sans-serif,-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;
    font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;
    overscroll-behavior-y:contain;padding-bottom:env(safe-area-inset-bottom);}
  .num{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums;}
  .wrap{max-width:520px;margin:0 auto;padding:0 14px 90px;}

  /* HERO */
  .hero{position:relative;margin-top:calc(env(safe-area-inset-top) + 10px);
    border:1px solid var(--line);border-radius:18px;overflow:hidden;
    background:radial-gradient(120% 80% at 50% 0%,rgba(77,163,255,.16),transparent 60%),
      linear-gradient(180deg,#0a1220,#05070c 70%);
    box-shadow:0 0 40px rgba(77,163,255,.10),inset 0 1px 0 rgba(255,255,255,.04);}
  .hero-title{position:absolute;top:16px;left:18px;z-index:3;font-size:26px;font-weight:600;
    letter-spacing:-.01em;font-family:Georgia,"Times New Roman",serif;
    text-shadow:0 2px 14px rgba(0,0,0,.8);}
  .hero-art{position:relative;height:250px;overflow:hidden;display:grid;place-items:center;}
  .hero-art img{width:100%;height:100%;object-fit:cover;object-position:center 22%;display:none;}
  .hero-art.has-img img{display:block;}
  .hero-art.has-img .fallback{display:none;}
  .fallback{width:190px;opacity:.92;}
  .hero-art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:62%;
    background:linear-gradient(180deg,transparent,#05070c 88%);pointer-events:none;}
  .hero-id{position:relative;z-index:2;margin-top:-64px;padding:0 18px 16px;text-align:center;}
  .rank-eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--cy);text-shadow:0 0 12px var(--cy-soft);margin-bottom:2px;}
  .lvl{font-size:40px;font-weight:600;letter-spacing:-.02em;line-height:1.05;
    text-shadow:0 0 26px rgba(77,163,255,.45);}
  .tier{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-dim);margin-top:3px;}
  .xp{padding:0 18px 16px;position:relative;z-index:2;}
  .xp-track{height:8px;border-radius:99px;background:#0e1725;border:1px solid var(--line);
    overflow:hidden;position:relative;}
  .xp-fill{position:absolute;inset:0 auto 0 0;border-radius:99px;
    background:linear-gradient(90deg,#2b7fd4,var(--cy));box-shadow:0 0 14px var(--cy-soft);
    transition:width .55s cubic-bezier(.2,.8,.3,1);}
  .xp-legend{display:flex;justify-content:space-between;align-items:center;margin-top:7px;
    font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}
  .xp-mid{color:var(--cy);letter-spacing:.1em;}
  .week{display:flex;justify-content:space-between;gap:6px;padding:0 18px 20px;position:relative;z-index:2;}
  .wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .wd-c{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--line);
    background:#0a1220;display:grid;place-items:center;transition:.2s;}
  .wd-c svg{width:15px;height:15px;opacity:0;transition:.2s;}
  .wd.full .wd-c{border-color:var(--cy);box-shadow:0 0 12px var(--cy-soft);background:#0d1c30;}
  .wd.full .wd-c svg{opacity:1;}
  .wd.part .wd-c{border-color:#2b7fd4;}
  .wd.part .wd-c svg{opacity:.45;}
  .wd.miss .wd-c{border-color:#3a2130;}
  .wd.today .wd-c{border-color:var(--ink-dim);box-shadow:0 0 0 3px rgba(143,163,189,.12);}
  .wd-l{font-size:10px;color:var(--ink-faint);letter-spacing:.06em;}

  .sect{display:flex;justify-content:space-between;align-items:baseline;margin:26px 2px 11px;}
  .sect h2{margin:0;font-size:19px;font-weight:600;letter-spacing:-.01em;
    font-family:Georgia,"Times New Roman",serif;}
  .sect .meta{font-size:11px;color:var(--ink-faint);letter-spacing:.1em;}
  .sect button{background:none;border:none;color:var(--ink-faint);font:inherit;font-size:11px;
    letter-spacing:.14em;text-transform:uppercase;cursor:pointer;padding:4px 0;}
  .sect button:active{color:var(--cy);}

  /* HABITS */
  .habits{display:flex;flex-direction:column;gap:9px;}
  .hb{position:relative;display:flex;align-items:center;gap:12px;background:var(--panel);
    border:1px solid var(--line);border-radius:13px;padding:14px 14px;cursor:pointer;
    user-select:none;overflow:hidden;transition:transform .12s,box-shadow .2s,border-color .2s;}
  .hb:active{transform:scale(.985);}
  .hb .prog{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--dc);
    opacity:.10;transition:width .4s linear;pointer-events:none;}
  .hb>*{position:relative;z-index:1;}
  .hb .gem{width:22px;height:22px;flex:none;
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:var(--dc);opacity:.9;box-shadow:0 0 12px var(--dc);}
  .hb-body{flex:1;min-width:0;}
  .hb-name{font-size:14.5px;transition:.2s;}
  .hb-sub{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-top:2px;}
  .hb-sub b{color:var(--dc);font-weight:400;}
  .tick{width:24px;height:24px;flex:none;border-radius:6px;border:1.5px solid var(--ink-faint);
    display:grid;place-items:center;transition:.18s;}
  .tick svg{width:14px;height:14px;opacity:0;transition:opacity .18s;}
  .tick.play{border-color:var(--dc);border-radius:50%;}
  .tick.play svg{opacity:1;}
  .hb.on{border-color:var(--dc);box-shadow:0 0 0 1px var(--dc),0 0 22px -6px var(--dc);}
  .hb.on .tick{background:var(--dc);border-color:var(--dc);border-radius:6px;}
  .hb.on .tick svg{opacity:1;}
  .hb.on .hb-name{color:var(--ink-dim);}
  .hb.running{border-color:var(--dc);box-shadow:0 0 0 1px var(--dc),0 0 26px -4px var(--dc);}
  .del{flex:none;background:none;border:none;color:var(--ink-faint);font-size:22px;
    line-height:1;padding:0 4px;cursor:pointer;display:none;}
  body.editing .del{display:block;}

  .doms{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .dom{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 13px;}
  .dom-top{display:flex;justify-content:space-between;align-items:baseline;}
  .dom-n{font-size:12.5px;color:var(--ink-dim);}
  .dom-v{font-size:19px;font-weight:600;}
  .dom-bar{height:3px;border-radius:2px;background:#0e1725;margin-top:8px;overflow:hidden;}
  .dom-bar span{display:block;height:100%;transition:width .5s ease;}

  .add{background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:14px;margin-top:10px;display:none;}
  body.editing .add{display:block;}
  .add input,.add select{width:100%;background:#070c15;border:1px solid var(--line);
    color:var(--ink);font:inherit;padding:11px;border-radius:9px;margin-bottom:9px;-webkit-appearance:none;}
  .add input:focus,.add select:focus{outline:none;border-color:var(--cy);}
  .add .row{display:flex;gap:9px;}
  .add .row>*{flex:1;}
  .btn{width:100%;background:var(--cy);color:#05070c;border:none;font:inherit;
    font-weight:600;padding:12px;border-radius:9px;cursor:pointer;}
  .btn:active{opacity:.8;}
  .foot{margin-top:26px;padding-top:15px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--ink-faint);letter-spacing:.08em;}
  .foot button{background:none;border:none;color:var(--ink-faint);font:inherit;cursor:pointer;
    text-decoration:underline;text-underline-offset:3px;padding:6px 0;}
  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:13px;
    padding:26px 16px;text-align:center;color:var(--ink-dim);font-size:13px;}

  /* ============ FOCUS OVERLAY ============ */
  .ov{position:fixed;inset:0;z-index:50;background:#05070c;
    display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:24px calc(24px + env(safe-area-inset-left)) calc(24px + env(safe-area-inset-bottom));}
  .ov.open{display:flex;}
  .ov::before{content:"";position:absolute;inset:0;
    background:radial-gradient(70% 50% at 50% 40%,var(--ovc,rgba(77,163,255,.18)),transparent 70%);
    pointer-events:none;}
  .ov-in{position:relative;width:100%;max-width:340px;text-align:center;}
  .ov-eye{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-faint);}
  .ov-name{font-size:21px;font-weight:600;margin:8px 0 26px;
    font-family:Georgia,"Times New Roman",serif;}
  .ring-w{position:relative;width:236px;height:236px;margin:0 auto;}
  .ring-w svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:#101a29;stroke-width:9;}
  .ring-fg{fill:none;stroke:var(--dc,#4da3ff);stroke-width:9;stroke-linecap:round;
    filter:drop-shadow(0 0 8px var(--dc,#4da3ff));transition:stroke-dashoffset .95s linear;}
  .ring-c{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;}
  .ov-time{font-size:47px;font-weight:600;letter-spacing:-.03em;line-height:1;}
  .ov-of{font-size:11px;color:var(--ink-faint);letter-spacing:.16em;margin-top:8px;}
  .ov-acts{display:flex;gap:10px;margin-top:32px;}
  .ov-acts button{flex:1;background:none;border:1px solid var(--line);color:var(--ink-dim);
    font:inherit;font-size:14px;padding:13px;border-radius:11px;cursor:pointer;}
  .ov-acts button.primary{background:var(--dc,#4da3ff);border-color:var(--dc,#4da3ff);
    color:#05070c;font-weight:600;}
  .ov-acts button:active{opacity:.75;}
  .ov-note{font-size:11px;color:var(--ink-faint);margin-top:18px;line-height:1.6;}
  .ov.done .ov-time{color:var(--dc,#4da3ff);text-shadow:0 0 30px var(--dc,#4da3ff);}
  .ov.done .ring-w{animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.035);}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div class="wrap">

  <section class="hero">
    <div class="hero-title">Home.</div>
    <div class="hero-art" id="art">
      <img id="heroimg" alt="">
      <svg class="fallback" viewBox="0 0 200 240" fill="none" aria-hidden="true">
        <ellipse cx="100" cy="228" rx="52" ry="7" fill="#4da3ff" opacity=".16"/>
        <path d="M100 26 L138 74 L128 176 L100 206 L72 176 L62 74 Z" fill="#0f1b2c" stroke="#2b7fd4" stroke-width="1.5"/>
        <path d="M100 26 L138 74 L100 92 L62 74 Z" fill="#16283f" stroke="#4da3ff" stroke-width="1.5"/>
        <path d="M100 92 L128 176 L100 206 L72 176 Z" fill="#0b1626" stroke="#2b7fd4" stroke-width="1.2"/>
        <path d="M100 46 L100 186" stroke="#4da3ff" stroke-width="1" opacity=".5"/>
        <circle cx="100" cy="120" r="17" fill="#05070c" stroke="#4da3ff" stroke-width="1.5"/>
        <circle cx="100" cy="120" r="7" fill="#4da3ff" opacity=".85"/>

    <div class="hero-id">
      <div class="rank-eyebrow" id="rankname">Initiate</div>

    <div class="xp">
      <div class="xp-track"><div class="xp-fill" id="xpfill" style="width:0%"></div></div>

    <div class="week" id="week"></div>
  </section>

  <div class="sect"><h2 id="datestr">Today</h2>
    <span><span class="meta num" style="color:#3ddc97;letter-spacing:.14em">v4 計時版</span>
    &nbsp;<button id="editbtn">編輯</button></span></div>
  <div class="habits" id="habits"></div>

  <div class="add">
    <input id="newname" placeholder="習慣名稱" maxlength="40">
    <div class="row">
      <select id="newdom"></select>
      <select id="newpts">
        <option value="1">1 分</option><option value="2" selected>2 分</option>
        <option value="3">3 分</option><option value="5">5 分</option>
      </select>
    </div>
    <select id="newmin">
      <option value="0" selected>打勾完成(不計時)</option>
      <option value="5">計時 5 分鐘</option>
      <option value="10">計時 10 分鐘</option>
      <option value="15">計時 15 分鐘</option>
      <option value="20">計時 20 分鐘</option>
      <option value="25">計時 25 分鐘</option>
      <option value="30">計時 30 分鐘</option>
      <option value="45">計時 45 分鐘</option>
      <option value="60">計時 60 分鐘</option>
      <option value="90">計時 90 分鐘</option>
      <option value="120">計時 120 分鐘</option>
    </select>
    <button class="btn" id="addbtn">新增習慣</button>
  </div>

  <div class="sect"><h2>Progress.</h2><span class="meta num" id="totalpts">0 pts</span></div>
  <div class="doms" id="domains"></div>

  <div class="foot">
    <span class="num" id="streak">連續 0 天</span>
    <span><button id="artbtn">換圖</button> · <button id="exportbtn">匯出</button> · <button id="importbtn">匯入</button></span>
  </div>
  <input type="file" id="fileinput" accept=".json" style="display:none">
  <input type="file" id="imginput" accept="image/*" style="display:none">
</div>

<div class="ov" id="ov">
  <div class="ov-in">
    <div class="ov-eye" id="ovEye">專注中</div>
    <div class="ov-name" id="ovName"></div>
    <div class="ring-w">
      <svg viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
        <circle class="ring-fg" id="ovRing" cx="60" cy="60" r="52"
          stroke-dasharray="326.7" stroke-dashoffset="326.7"></circle>
      </svg>
      <div class="ring-c">
        <div class="ov-time num" id="ovTime">00:00</div>
        <div class="ov-of num" id="ovOf"></div>
      </div>
    </div>
    <div class="ov-acts">
      <button id="ovStop">暫停離開</button>
      <button class="primary" id="ovDone" style="display:none">完成</button>

  </div>
</div>

<div class="ov" id="edov">
  <div class="ov-in">
    <div class="ov-eye">編輯習慣</div>
    <div class="ov-name" id="edTitle">—</div>
    <input id="edName" maxlength="40" placeholder="名稱"
      style="width:100%;background:#070c15;border:1px solid var(--line);color:var(--ink);
      font:inherit;padding:12px;border-radius:10px;margin-bottom:9px;-webkit-appearance:none;text-align:center">
    <div style="display:flex;gap:9px;margin-bottom:9px">
      <select id="edDom" style="flex:1;background:#070c15;border:1px solid var(--line);
        color:var(--ink);font:inherit;padding:12px;border-radius:10px;-webkit-appearance:none"></select>
      <select id="edPts" style="flex:1;background:#070c15;border:1px solid var(--line);
        color:var(--ink);font:inherit;padding:12px;border-radius:10px;-webkit-appearance:none">
        <option value="1">1 分</option><option value="2">2 分</option>
        <option value="3">3 分</option><option value="5">5 分</option>
      </select>
    </div>
    <select id="edMin" style="width:100%;background:#070c15;border:1px solid var(--line);
      color:var(--ink);font:inherit;padding:12px;border-radius:10px;-webkit-appearance:none">
      <option value="0">打勾完成(不計時)</option>
      <option value="5">計時 5 分鐘</option><option value="10">計時 10 分鐘</option>
      <option value="15">計時 15 分鐘</option><option value="20">計時 20 分鐘</option>
      <option value="25">計時 25 分鐘</option><option value="30">計時 30 分鐘</option>
      <option value="45">計時 45 分鐘</option><option value="60">計時 60 分鐘</option>
      <option value="90">計時 90 分鐘</option><option value="120">計時 120 分鐘</option>
    </select>
    <div class="ov-acts" style="margin-top:20px">
      <button id="edCancel">取消</button>
      <button class="primary" id="edSave">儲存</button>
    </div>
    <div class="ov-note">改成計時型後,卡片圖示會變成 ▶。</div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var DOMAINS=[
    {id:"body",name:"身體",color:"#3ddc97"},
    {id:"mind",name:"心智",color:"#4da3ff"},
    {id:"work",name:"產出",color:"#a97bff"},
    {id:"order",name:"秩序",color:"#ff8a4d"},
    {id:"calm",name:"節制",color:"#ff5d73"}
  ];
  var RANKS=[
    {at:0,name:"Initiate",tier:"IRON"},{at:3,name:"Adept",tier:"BRONZE"},
    {at:6,name:"Hunter",tier:"SILVER"},{at:10,name:"Awakened",tier:"GOLD"},
    {at:16,name:"Ascendant",tier:"DIAMOND"},{at:24,name:"Immortal",tier:"IMMORTAL"},
    {at:36,name:"Sovereign",tier:"SOVEREIGN"}
  ];
  var ROMAN=["IV","III","II","I"];
  var SEED=[
    {name:"運動 1 小時",dom:"body",pts:3,min:60},
    {name:"睡滿 7 小時",dom:"body",pts:2,min:0},
    {name:"閱讀 20 分鐘",dom:"mind",pts:2,min:20},
    {name:"深度工作 2 小時",dom:"work",pts:3,min:120},
    {name:"整理環境",dom:"order",pts:1,min:0},
    {name:"螢幕時間 < 4 小時",dom:"calm",pts:2,min:0}
  ];

  var MISS_PENALTY=0.5,FLOOR=0,PER_LEVEL=100;
  var KEY="ascend.v3",IMGKEY="ascend.v2.img";
  var state=load();

  function load(){
    try{
      var raw=localStorage.getItem(KEY);
      if(raw){var s=JSON.parse(raw);if(s&&s.habits)return migrate(s);}
      var v2=localStorage.getItem("ascend.v2");
      if(v2){var o=JSON.parse(v2);if(o&&o.habits)return migrate(o);}
      var v1=localStorage.getItem("ledger.v1");
      if(v1){var p=JSON.parse(v1);if(p&&p.habits)return migrate(p);}
    }catch(e){}
    return {habits:SEED.map(function(h,i){
      return {id:"h"+i+"_"+Date.now(),name:h.name,dom:h.dom,pts:h.pts,min:h.min};
    }),log:{},time:{},created:today()};
  }
  function guessMin(name){
    if(/[<＜≤]/.test(name)) return 0;
    if(/睡|起床|就寢/.test(name)) return 0;
    var m=name.match(/(\d+(?:\.\d+)?)\s*(分鐘|分|min|mins|minutes)/i);
    if(m) return Math.min(240,Math.round(parseFloat(m[1])));
    m=name.match(/(\d+(?:\.\d+)?)\s*(小時|小时|hrs?|hours?)/i);
    if(m) return Math.min(240,Math.round(parseFloat(m[1])*60));
    m=name.match(/(\d+(?:\.\d+)?)\s*h(?![a-z])/i);
    if(m) return Math.min(240,Math.round(parseFloat(m[1])*60));
    return 0;
  }
  function migrate(s){
    s.habits.forEach(function(h){
      if(typeof h.min!=="number") h.min=guessMin(h.name);
    });
    if(!s.time)s.time={};
    return s;
  }
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

  function pad(n){return n<10?"0"+n:""+n;}
  function today(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function dayKey(o){var d=new Date();d.setDate(d.getDate()-o);
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function daysSince(s){var a=new Date(s+"T00:00:00"),b=new Date(today()+"T00:00:00");
    return Math.max(0,Math.round((b-a)/86400000));}
  function doneSet(dk){return state.log[dk]||[];}
  function habitById(id){
    for(var i=0;i<state.habits.length;i++) if(state.habits[i].id===id) return state.habits[i];
    return null;
  }

  /* ---- accumulated seconds for a habit today ---- */
  function acc(id){
    var t=state.time[today()];
    return (t&&t[id])||0;
  }
  function addAcc(id,sec){
    var dk=today();
    if(!state.time[dk])state.time[dk]={};
    state.time[dk][id]=(state.time[dk][id]||0)+sec;
    // prune old day buckets (keep 7)
    var ks=Object.keys(state.time).sort();
    while(ks.length>7){delete state.time[ks.shift()];}
  }

  /* ---- timer session ---- */
  var run=null;   // {id, startedAt, base, target}
  var tickHandle=null;

  function elapsed(){
    if(!run)return 0;
    return run.base+Math.floor((Date.now()-run.startedAt)/1000);
  }

  function startTimer(h){
    var have=acc(h.id), target=h.min*60;
    if(have>=target){markDone(h.id);return;}
    run={id:h.id,startedAt:Date.now(),base:have,target:target};
    openOverlay(h);
    tickHandle=setInterval(tick,250);
    tick();
  }

  function tick(){
    if(!run)return;
    var e=Math.min(run.target,elapsed()), left=run.target-e;
    var ov=$("ov");
    $("ovTime").textContent=fmt(left);
    $("ovOf").textContent=fmt(e)+" / "+fmt(run.target);
    var C=2*Math.PI*52;
    $("ovRing").setAttribute("stroke-dashoffset",String(C*(1-e/run.target)));
    if(left<=0&&!ov.classList.contains("done")) finish();
  }

  function fmt(s){
    s=Math.max(0,Math.round(s));
    var h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;
    return h>0? h+":"+pad(m)+":"+pad(x) : pad(m)+":"+pad(x);
  }

  function finish(){
    var id=run.id;
    stopClock();
    var dk=today();
    if(!state.time[dk])state.time[dk]={};
    state.time[dk][id]=habitById(id).min*60;
    markDone(id,true);
    save();
    var ov=$("ov");
    ov.classList.add("done");
    $("ovEye").textContent="完成";
    $("ovTime").textContent="00:00";
    $("ovStop").style.display="none";
    $("ovDone").style.display="block";
    $("ovNote").textContent="已記入今日進度。";
    buzz(); beep();
    run=null;
    render();
  }

  function stopClock(){
    if(tickHandle){clearInterval(tickHandle);tickHandle=null;}
  }

  /* pause & keep progress */
  function pauseTimer(){
    if(run){
      var gained=Math.min(run.target,elapsed())-run.base;
      if(gained>0)addAcc(run.id,gained);
      save();
    }
    stopClock(); run=null;
    closeOverlay(); render();
  }

  function markDone(id,silent){
    var dk=today(),a=state.log[dk]||[];
    if(a.indexOf(id)<0)a.push(id);
    state.log[dk]=a; save();
    if(!silent&&navigator.vibrate)navigator.vibrate(9);
  }
  function unmarkDone(id){
    var dk=today(),a=state.log[dk]||[],i=a.indexOf(id);
    if(i>-1)a.splice(i,1);
    state.log[dk]=a;
    if(state.time[dk])delete state.time[dk][id];
    save();
  }

  function buzz(){
    if(navigator.vibrate)navigator.vibrate([90,70,90,70,220]);
  }
  var actx=null;
  function beep(){
    try{
      actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state==="suspended")actx.resume();
      [0,.18,.36].forEach(function(off,i){
        var o=actx.createOscillator(),g=actx.createGain();
        o.type="sine";
        o.frequency.value=[660,880,1180][i];
        g.gain.setValueAtTime(0,actx.currentTime+off);
        g.gain.linearRampToValueAtTime(.22,actx.currentTime+off+.02);
        g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+off+.34);
        o.connect(g);g.connect(actx.destination);
        o.start(actx.currentTime+off);o.stop(actx.currentTime+off+.36);
      });
    }catch(e){}
  }

  /* ---- overlay ---- */
  function openOverlay(h){
    var dm=DOMAINS.filter(function(x){return x.id===h.dom;})[0]||DOMAINS[0];
    var ov=$("ov");
    ov.classList.remove("done");
    ov.classList.add("open");
    ov.style.setProperty("--dc",dm.color);
    ov.style.setProperty("--ovc",hexA(dm.color,.18));
    $("ovEye").textContent="專注中";
    $("ovName").textContent=h.name;
    $("ovStop").style.display="block";
    $("ovDone").style.display="none";
    $("ovNote").textContent="切到其他 App 計時照跑。進度會保留到今天結束。";
  }
  function closeOverlay(){
    var ov=$("ov");
    ov.classList.remove("open");ov.classList.remove("done");
  }
  function hexA(hex,a){
    var n=parseInt(hex.slice(1),16);
    return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
  }

  /* ---- scoring ---- */
  function scores(){
    var tot={},all=0;
    DOMAINS.forEach(function(d){tot[d.id]=0;});
    var span=daysSince(state.created);
    for(var i=span;i>=0;i--){
      var done=doneSet(dayKey(i)),isToday=(i===0);
      state.habits.forEach(function(h){
        if(done.indexOf(h.id)>-1){tot[h.dom]=(tot[h.dom]||0)+h.pts;all+=h.pts;}
        else if(!isToday){
          tot[h.dom]=Math.max(FLOOR,(tot[h.dom]||0)-h.pts*MISS_PENALTY);
          all=Math.max(FLOOR,all-h.pts*MISS_PENALTY);
        }
      });
    }
    return {byDom:tot,total:Math.round(all)};
  }
  function pending(){
    var done=doneSet(today()),p=0;
    state.habits.forEach(function(h){if(done.indexOf(h.id)<0)p+=h.pts*MISS_PENALTY;});
    return p;
  }
  function streak(){
    var n=0;
    for(var i=1;i<500;i++){if(doneSet(dayKey(i)).length>0)n++;else break;}
    if(doneSet(today()).length>0)n++;
    return n;
  }
  function rankFor(lvl){
    var r=RANKS[0];
    for(var i=0;i<RANKS.length;i++)if(lvl>=RANKS[i].at)r=RANKS[i];
    var idx=RANKS.indexOf(r),next=RANKS[idx+1]?RANKS[idx+1].at:r.at+8;
    var span=Math.max(1,next-r.at);
    var step=Math.min(3,Math.floor(Math.max(0,lvl-1-r.at)/span*4));
    return {name:r.name,tier:r.tier+" "+ROMAN[step]};
  }

  var $=function(i){return document.getElementById(i);};
  var CHECK='<svg viewBox="0 0 12 12" fill="none" stroke="#05070c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.3l2.6 2.6L10 3.4"/></svg>';
  var CHECK_C='<svg viewBox="0 0 12 12" fill="none" stroke="#4da3ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.3l2.6 2.6L10 3.4"/></svg>';
  var PLAY='<svg viewBox="0 0 12 12" fill="var(--dc)" stroke="none"><path d="M3.6 2.4 L9.4 6 L3.6 9.6 Z"/></svg>';

  function render(){
    var s=scores(),lvl=Math.floor(s.total/PER_LEVEL)+1,into=s.total%PER_LEVEL;
    var rk=rankFor(lvl);
    $("level").textContent=lvl;
    $("rankname").textContent=rk.name;
    $("tier").textContent=rk.tier;
    $("totalpts").textContent=s.total+" pts";
    $("xpfill").style.width=(into/PER_LEVEL*100)+"%";
    $("lvlA").textContent="Lv. "+lvl;
    $("lvlB").textContent="Lv. "+(lvl+1);
    $("xpmid").textContent=(PER_LEVEL-into)+" XP to next";

    var d=new Date(),
      DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
      MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    $("datestr").textContent=DN[d.getDay()]+", "+MN[d.getMonth()]+" "+d.getDate()+".";

    var wk=$("week");wk.innerHTML="";
    var dow=(d.getDay()+6)%7,L=["M","T","W","T","F","S","S"];
    for(var i=0;i<7;i++){
      var off=dow-i,cls="wd";
      if(off>=0){
        var cnt=doneSet(dayKey(off)).length;
        if(state.habits.length&&cnt>=state.habits.length)cls+=" full";
        else if(cnt>0)cls+=" part";
        else if(off>0)cls+=" miss";
      }
      if(off===0)cls+=" today";
      var el=document.createElement("div");
      el.className=cls;
      el.innerHTML='<div class="wd-c">'+CHECK_C+'</div><div class="wd-l">'+L[i]+'</div>';
      wk.appendChild(el);
    }

    var done=doneSet(today()),hc=$("habits");
    hc.innerHTML="";
    if(!state.habits.length)hc.innerHTML='<div class="empty">還沒有習慣。點「編輯」新增。</div>';
    state.habits.forEach(function(h){
      var on=done.indexOf(h.id)>-1;
      var dm=DOMAINS.filter(function(x){return x.id===h.dom;})[0]||DOMAINS[0];
      var timed=h.min>0, have=acc(h.id), target=h.min*60;
      var el=document.createElement("div");
      el.className="hb"+(on?" on":"")+(run&&run.id===h.id?" running":"");
      el.style.setProperty("--dc",dm.color);

      var sub=dm.name+" · +"+h.pts;
      if(timed&&!on){
        sub+= have>0 ? " · <b>"+fmt(have)+" / "+fmt(target)+"</b>"
                     : " · "+h.min+" 分鐘";
      }else if(timed&&on){
        sub+=" · "+h.min+" 分鐘 ✓";
      }

      el.innerHTML='<div class="prog"></div><div class="gem"></div>'+
        '<div class="hb-body"><div class="hb-name"></div><div class="hb-sub"></div></div>'+
        '<button class="del" aria-label="刪除">&times;</button>'+
        '<div class="tick'+(timed&&!on?" play":"")+'">'+(timed&&!on?PLAY:CHECK)+'</div>';
      el.querySelector(".hb-name").textContent=h.name;
      el.querySelector(".hb-sub").innerHTML=sub;
      if(timed&&have>0&&!on)
        el.querySelector(".prog").style.width=Math.min(100,have/target*100)+"%";

      el.addEventListener("click",function(ev){
        if(ev.target.classList.contains("del"))return;
        if(document.body.classList.contains("editing")){ openEdit(h.id); return; }
        if(on){ unmarkDone(h.id); render(); return; }
        if(timed) startTimer(h);
        else { markDone(h.id); render(); }
      });
      el.querySelector(".del").addEventListener("click",function(ev){
        ev.stopPropagation();removeHabit(h.id);
      });
      hc.appendChild(el);
    });

    var dc=$("domains");dc.innerHTML="";
    var mx=Math.max(1,Math.max.apply(null,DOMAINS.map(function(x){return s.byDom[x.id]||0;})));
    DOMAINS.forEach(function(dm){
      var v=Math.round(s.byDom[dm.id]||0);
      var el=document.createElement("div");
      el.className="dom";
      el.innerHTML='<div class="dom-top"><span class="dom-n"></span>'+
        '<span class="dom-v num">'+v+'</span></div>'+
        '<div class="dom-bar"><span style="width:'+(v/mx*100)+'%;background:'+dm.color+
        ';box-shadow:0 0 8px '+dm.color+'"></span></div>';
      el.querySelector(".dom-n").textContent=dm.name;
      dc.appendChild(el);
    });

    var p=pending();
    $("streak").textContent="連續 "+streak()+" 天"+(p>0?"　今日 −"+(Math.round(p*10)/10):"");
  }

  function removeHabit(id){
    state.habits=state.habits.filter(function(h){return h.id!==id;});
    Object.keys(state.log).forEach(function(k){
      state.log[k]=state.log[k].filter(function(x){return x!==id;});
    });
    Object.keys(state.time).forEach(function(k){delete state.time[k][id];});
    save();render();
  }

  /* ---- edit habit ---- */
  var editingId=null;
  function openEdit(id){
    var h=habitById(id); if(!h)return;
    editingId=id;
    var dm=DOMAINS.filter(function(x){return x.id===h.dom;})[0]||DOMAINS[0];
    var ov=$("edov");
    ov.style.setProperty("--dc",dm.color);
    ov.style.setProperty("--ovc",hexA(dm.color,.18));
    $("edTitle").textContent=h.name;
    $("edName").value=h.name;
    $("edDom").value=h.dom;
    $("edPts").value=String(h.pts);
    $("edMin").value=String(h.min||0);
    ov.classList.add("open");
  }
  $("edCancel").addEventListener("click",function(){
    $("edov").classList.remove("open"); editingId=null;
  });
  $("edSave").addEventListener("click",function(){
    var h=habitById(editingId);
    if(h){
      var n=$("edName").value.trim();
      if(n)h.name=n;
      h.dom=$("edDom").value;
      h.pts=parseInt($("edPts").value,10);
      var nm=parseInt($("edMin").value,10);
      if(nm!==h.min){
        var dk=today();
        if(state.time[dk])delete state.time[dk][editingId];
      }
      h.min=nm;
      save();
    }
    $("edov").classList.remove("open"); editingId=null; render();
  });

  /* overlay buttons */
  $("ovStop").addEventListener("click",pauseTimer);
  $("ovDone").addEventListener("click",function(){closeOverlay();render();});

  /* resync after backgrounding */
  document.addEventListener("visibilitychange",function(){
    if(!document.hidden&&run)tick();
  });
  window.addEventListener("pageshow",function(){if(run)tick();});

  /* image */
  function loadImg(){
    try{var d=localStorage.getItem(IMGKEY);
      if(d){$("heroimg").src=d;$("art").classList.add("has-img");}}catch(e){}
  }
  $("artbtn").addEventListener("click",function(){$("imginput").click();});
  $("imginput").addEventListener("change",function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      var img=new Image();
      img.onload=function(){
        var W=760,sc=W/img.width,H=Math.round(img.height*sc);
        var c=document.createElement("canvas");c.width=W;c.height=H;
        c.getContext("2d").drawImage(img,0,0,W,H);
        var data=c.toDataURL("image/jpeg",.82);
        try{localStorage.setItem(IMGKEY,data);$("heroimg").src=data;
          $("art").classList.add("has-img");}
        catch(err){alert("圖片太大,存不下。換一張小一點的。");}
      };
      img.src=r.result;
    };
    r.readAsDataURL(f);
  });

  var ds=$("newdom"), eds=$("edDom");
  DOMAINS.forEach(function(d){
    var o=document.createElement("option");
    o.value=d.id;o.textContent=d.name;ds.appendChild(o);
    var o2=document.createElement("option");
    o2.value=d.id;o2.textContent=d.name;eds.appendChild(o2);
  });
  $("editbtn").addEventListener("click",function(){
    var on=document.body.classList.toggle("editing");
    this.textContent=on?"完成":"編輯";
  });
  $("addbtn").addEventListener("click",function(){
    var n=$("newname").value.trim();if(!n)return;
    state.habits.push({id:"h"+Date.now(),name:n,dom:$("newdom").value,
      pts:parseInt($("newpts").value,10),min:parseInt($("newmin").value,10)});
    $("newname").value="";save();render();
  });
  $("exportbtn").addEventListener("click",function(){
    var b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(b);a.download="ascend-"+today()+".json";a.click();
  });
  $("importbtn").addEventListener("click",function(){$("fileinput").click();});
  $("fileinput").addEventListener("change",function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{var s=JSON.parse(r.result);if(s&&s.habits){state=migrate(s);save();render();}}catch(err){}
    };
    r.readAsText(f);
  });

  loadImg();save();render();
  setInterval(function(){
    var d=new Date();
    if(d.getHours()===0&&d.getMinutes()<2)render();
  },60000);
})();
</script>
</body>
</html>
